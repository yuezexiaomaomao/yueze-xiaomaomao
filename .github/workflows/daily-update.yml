# ============================================
# A股数据每日自动更新
# 每个交易日收盘后（北京时间 18:00）触发
# 运行 data_fetcher.py 抓取最新股价数据
# ============================================

name: Daily Data Update

on:
  schedule:
    # 北京时间 18:00 = UTC 10:00
    - cron: '0 10 * * 1-5'
  # 也允许手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install akshare pyyaml pandas --quiet

      - name: Fetch stock data
        run: |
          python data_fetcher.py --config config.yaml --output data/
        env:
          # 防止 akshare 因网络问题超时
          AKSHARE_REQUEST_TIMEOUT: "30"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if ! git diff --cached --quiet; then
            git commit -m "📊 auto: 每日数据更新 $(date +'%Y-%m-%d %H:%M' UTC)"
            git push origin main
            echo "CHANGES_PUSHED=true" >> $GITHUB_ENV
          else
            echo "没有数据变更，跳过推送"
            echo "CHANGES_PUSHED=false" >> $GITHUB_ENV
          fi
