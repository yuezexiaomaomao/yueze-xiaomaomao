<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#0002 核能产业链深度分析 - 月泽小猫猫的逻辑库</title>
<style>
:root {
  --bg: #f5f5f5; --bg-card: #fff; --text-primary: #1a1a1a;
  --text-secondary: #555; --text-muted: #888;
  --accent: #1a73e8; --border-color: #e0e0e0;
  --radius-md: 10px; --radius-sm: 6px;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --signal-safe: #43a047; --signal-danger: #e53935; --signal-warning: #f9a825;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
  background: var(--bg); color: var(--text-primary);
  line-height: 1.6;
}

/* ===== Header ===== */
.page-header {
  background: #fff; border-bottom: 1px solid var(--border-color);
  padding: 16px 24px;
}
.page-header .breadcrumb {
  font-size: 0.82rem; color: var(--text-muted); margin-bottom: 6px;
}
.page-header .breadcrumb a {
  color: var(--accent); text-decoration: none;
}
.page-header .breadcrumb a:hover { text-decoration: underline; }
.page-header h1 {
  font-size: 1.2rem; font-weight: 700; color: var(--text-primary);
}

/* ===== Tab navigation ===== */
.tab-nav {
  display: flex; background: #fff; border-bottom: 1px solid var(--border-color);
  position: sticky; top: 0; z-index: 100;
}
.tab-btn {
  padding: 14px 24px; cursor: pointer; font-size: 0.92rem;
  font-weight: 500; color: var(--text-muted);
  border: none; background: none; transition: all 0.2s;
  border-bottom: 2px solid transparent;
}
.tab-btn:hover { color: var(--text-primary); background: #f8f8f8; }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ===== Tab content ===== */
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ===== Dashboard Tab ===== */
.dashboard-container { padding: 24px; max-width: 1000px; }

/* Stock grid */
.stock-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 12px; margin-bottom: 28px;
}
.stock-card {
  background: var(--bg-card); border-radius: var(--radius-md);
  padding: 16px; box-shadow: var(--shadow);
  border-left: 4px solid var(--border-color);
}
.stock-card.rating-s { border-left-color: #1a237e; }
.stock-card.rating-a { border-left-color: var(--accent); }
.stock-card.rating-bp { border-left-color: #43a047; }
.stock-card.rating-b { border-left-color: var(--text-muted); }
.stock-card .stock-name {
  font-size: 0.95rem; font-weight: 700; margin-bottom: 2px;
}
.stock-card .stock-code {
  font-size: 0.75rem; color: var(--text-muted); margin-bottom: 10px;
}
.stock-card .stock-metrics {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px;
}
.stock-card .metric-label { font-size: 0.72rem; color: var(--text-muted); }
.stock-card .metric-value { font-size: 0.95rem; font-weight: 600; }
.stock-card .metric-value.up { color: #ef5350; }
.stock-card .metric-value.down { color: #66bb6a; }
.stock-card .no-data {
  font-size: 0.78rem; color: var(--text-muted); font-style: italic; margin-top: 8px;
}
.rating-badge {
  display: inline-block; font-size: 0.68rem; font-weight: 600;
  padding: 1px 8px; border-radius: 3px; margin-bottom: 8px;
}
.rating-badge.s { background: #e8eaf6; color: #1a237e; }
.rating-badge.a { background: #e3f2fd; color: #1565c0; }
.rating-badge.bp { background: #e8f5e9; color: #2e7d32; }
.rating-badge.b { background: #f5f5f5; color: #616161; }

/* Tracking table */
.tracking-section { margin-top: 28px; }
.tracking-section h3 {
  font-size: 1rem; font-weight: 700; margin-bottom: 12px;
  padding-top: 20px; border-top: 1px solid var(--border-color);
}
.tracking-table {
  width: 100%; border-collapse: collapse; font-size: 0.88rem;
  background: var(--bg-card); border-radius: var(--radius-md);
  overflow: hidden; box-shadow: var(--shadow);
}
.tracking-table th {
  text-align: left; padding: 10px 14px;
  background: #f0f0f0; font-weight: 600;
  border-bottom: 2px solid var(--border-color);
  white-space: nowrap;
}
.tracking-table td {
  padding: 10px 14px; border-bottom: 1px solid #eee;
}
.tracking-table tr:last-child td { border-bottom: none; }
.tracking-table .status-ok { color: var(--signal-safe); font-weight: 600; }
.tracking-table .status-warn { color: var(--signal-warning); font-weight: 600; }
.tracking-table .status-err { color: var(--signal-danger); font-weight: 600; }

/* Events */
.events-section { margin-top: 28px; }
.events-section h3 {
  font-size: 1rem; font-weight: 700; margin-bottom: 10px;
}
.event-list { list-style: none; }
.event-list li {
  padding: 6px 0; font-size: 0.88rem;
  display: flex; align-items: flex-start; gap: 8px;
}
.event-list li::before {
  content: "☐"; font-size: 1rem; flex-shrink: 0; margin-top: 1px;
}
.event-tag {
  font-size: 0.72rem; border-radius: 3px; padding: 1px 6px;
  margin-left: 8px; flex-shrink: 0;
}
.event-tag.upcoming { background: #fff3e0; color: #e65100; }

/* ===== Report Tab ===== */
.report-container { padding: 0; }
.history-toggle {
  display: block; width: 100%; padding: 12px 24px;
  background: #f8f8f8; border: none; border-bottom: 1px solid var(--border-color);
  font-size: 0.88rem; color: var(--accent); cursor: pointer; text-align: left;
  font-family: inherit; transition: background 0.15s;
}
.history-toggle:hover { background: #f0f0f0; }
.history-toggle .arrow { transition: transform 0.2s; display: inline-block; margin-right: 4px; }
.history-toggle.open .arrow { transform: rotate(90deg); }

.history-panel {
  display: none; background: #fafafa; border-bottom: 1px solid var(--border-color);
  padding: 16px 24px;
}
.history-panel.open { display: block; }
.history-panel .version-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 8px 0; border-bottom: 1px solid #eee;
}
.history-panel .version-item:last-child { border-bottom: none; }
.version-tag {
  flex-shrink: 0; background: var(--accent); color: #fff;
  padding: 2px 8px; border-radius: 4px;
  font-size: 0.75rem; font-weight: 600;
}
.version-date { font-size: 0.78rem; color: var(--text-muted); }
.version-desc { font-size: 0.85rem; margin-top: 1px; }
.version-link { font-size: 0.82rem; color: var(--accent); text-decoration: none; }
.version-link:hover { text-decoration: underline; }

.report-container iframe {
  width: 100%; border: none; display: block;
  min-height: 2000px;
}

@media (max-width: 600px) {
  .page-header { padding: 12px 16px; }
  .page-header h1 { font-size: 1.05rem; }
  .tab-btn { padding: 12px 16px; font-size: 0.85rem; }
  .dashboard-container { padding: 16px; }
  .stock-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
}
</style>
</head>
<body>

<!-- ========== Header ========== -->
<div class="page-header">
  <div class="breadcrumb">
    <a href="../../index.html">首页</a> › #0002 核能产业链深度分析
  </div>
  <h1>#0002 核能产业链 — 10年现金流模型与DCF估值</h1>
</div>

<!-- ========== Tab 导航 ========== -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('report')">📄 最新研报</button>
  <button class="tab-btn" onclick="switchTab('dashboard')">📊 最新仪表盘</button>
</div>

<!-- ========== Tab 1：最新研报（默认） ========== -->
<div id="tab-report" class="tab-content active">
  <button class="history-toggle" id="historyToggle" onclick="toggleHistory()">
    <span class="arrow">▶</span> 📂 查看历史版本 (1)
  </button>
  <div class="history-panel" id="historyPanel">
    <div class="version-item">
      <span class="version-tag">v1</span>
      <div>
        <div class="version-date">2026-05-18</div>
        <div class="version-desc">核能产业链 + 10年现金流模型 + DCF估值 · 含电力供需与电价情景、五维框架</div>
        <a href="latest.html" class="version-link" target="_blank">在新窗口打开 →</a>
      </div>
    </div>
  </div>
  <div class="report-container">
    <iframe id="reportFrame" src="latest.html" onload="resizeIframe(this)"></iframe>
  </div>
</div>

<!-- ========== Tab 2：最新仪表盘 ========== -->
<div id="tab-dashboard" class="tab-content">
  <div class="dashboard-container">

    <h3 style="margin-bottom:12px;font-size:1.05rem;">📊 投资标的一览</h3>
    <div class="stock-grid" id="stockGrid">
      <!-- 由 JS 动态渲染 -->
    </div>

    <div class="tracking-section">
      <h3>📡 追踪仪表板</h3>
      <table class="tracking-table">
        <thead>
          <tr><th>指标</th><th>0002-1(26.5.18)</th><th>当前值</th><th>变化</th><th>状态</th></tr>
        </thead>
        <tbody id="trackingBody"></tbody>
      </table>
    </div>

    <div class="events-section">
      <h3>📅 待关注事件</h3>
      <ul class="event-list">
        <li>Q2 核电核准公告 <span class="event-tag upcoming">预计7月</span></li>
        <li>2026年半年报披露 <span class="event-tag upcoming">预计8月底</span></li>
        <li>铀长协谈判进展（Kazatomprom） <span class="event-tag upcoming">关注中</span></li>
        <li>电力市场化交易比例更新 <span class="event-tag upcoming">季度更新</span></li>
      </ul>
    </div>

  </div>
</div>

<script>
// ===== Tab 切换 =====
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelector(`.tab-btn[onclick*="${name}"]`).classList.add('active');
  if (name === 'dashboard') renderAll();
}

// ===== 历史版本折叠 =====
function toggleHistory() {
  var panel = document.getElementById('historyPanel');
  var btn = document.getElementById('historyToggle');
  var isOpen = panel.classList.contains('open');
  panel.classList.toggle('open');
  btn.classList.toggle('open');
  btn.querySelector('.arrow').textContent = isOpen ? '▶' : '▼';
}

// ===== iframe 自适应高度 =====
function resizeIframe(iframe) {
  function set() {
    try {
      var d = iframe.contentDocument || iframe.contentWindow.document;
      iframe.style.height = Math.max(d.documentElement.scrollHeight, d.body.scrollHeight, 2000) + 'px';
    } catch(e) { iframe.style.height = '5000px'; }
  }
  set(); setTimeout(set, 800); setTimeout(set, 2000);
}

// ===== 追踪数据 =====
var TRACKING = [
  {label: "中国核电 股价", lastVal: "9.04", field: "price", stockCode: "601985"},
  {label: "中国核电 PE(TTM)", lastVal: "20x", field: "pe", stockCode: "601985"},
  {label: "中国核电 PB", lastVal: "—", field: "pb", stockCode: "601985"},
  {label: "中国广核 股价", lastVal: "—", field: "price", stockCode: "003816"},
  {label: "DCF目标价（中性）", lastVal: "12.5元", currentVal: "待重算"},
  {label: "在建机组", lastVal: "12台（含核准待建）", currentVal: "待更新"},
  {label: "累计装机（已投产）", lastVal: "~25GW", currentVal: "待更新"},
];

// ===== 股票数据缓存 =====
var stockData = [];

// ===== 渲染股票卡片 =====
function renderStockCards() {
  var grid = document.getElementById('stockGrid');
  var ratings = {'S':'s','A':'a','B+':'bp','B':'b'};
  var html = '';
  stockData.forEach(function(s) {
    var ratingClass = ratings[s.rating] || 'b';
    var hasData = s.price != null;
    var priceStr = hasData ? s.price.toFixed(2) : '—';
    var peStr = s.pe != null ? s.pe.toFixed(1) + 'x' : '—';
    var pbStr = s.pb != null ? s.pb.toFixed(2) + 'x' : '—';
    var chgStr = '—', chgClass = '';
    if (s.changePercent != null) {
      chgStr = (s.changePercent > 0 ? '+' : '') + s.changePercent.toFixed(2) + '%';
      chgClass = s.changePercent > 0 ? 'up' : s.changePercent < 0 ? 'down' : '';
    }
    html += '<div class="stock-card rating-' + ratingClass + '">' +
      '<span class="rating-badge ' + ratingClass + '">' + s.rating + '级</span>' +
      '<div class="stock-name">' + s.name + '</div>' +
      '<div class="stock-code">' + s.code + '</div>' +
      (hasData ? (
        '<div class="stock-metrics">' +
          '<div><span class="metric-label">股价</span><div class="metric-value">' + priceStr + '</div></div>' +
          '<div><span class="metric-label">涨跌幅</span><div class="metric-value ' + chgClass + '">' + chgStr + '</div></div>' +
          '<div><span class="metric-label">PE</span><div class="metric-value">' + peStr + '</div></div>' +
          '<div><span class="metric-label">PB</span><div class="metric-value">' + pbStr + '</div></div>' +
        '</div>'
      ) : (
        '<div class="no-data">📡 股价待接入 data_fetcher<br>PE: ' + peStr + '（参考值）</div>'
      )) +
    '</div>';
  });
  grid.innerHTML = html;
}

// ===== 渲染追踪表 =====
function renderTracking() {
  var tbody = document.getElementById('trackingBody');
  var html = '';
  TRACKING.forEach(function(t) {
    var currentVal = t.currentVal || '—';
    var status = '—', statusClass = '';

    if (t.field && t.stockCode) {
      var s = stockData.find(function(x) { return x.code === t.stockCode; });
      if (s && s[t.field] != null) {
        currentVal = t.field === 'pe' ? s[t.field].toFixed(1) + 'x'
                   : t.field === 'pb' ? s[t.field].toFixed(2) + 'x'
                   : s[t.field].toFixed(2);
        if (t.field === 'price') {
          var diff = s.price - parseFloat(t.lastVal);
          if (!isNaN(diff)) {
            status = (diff > 0 ? '↑' : diff < 0 ? '↓' : '→') + ' ' + Math.abs(diff).toFixed(2);
            statusClass = diff > 0 ? 'status-ok' : diff < 0 ? 'status-warn' : '';
          }
        }
      }
    }

    html += '<tr>' +
      '<td>' + t.label + '</td>' +
      '<td>' + t.lastVal + '</td>' +
      '<td>' + currentVal + '</td>' +
      '<td>—</td>' +
      '<td class="' + statusClass + '">' + (status !== '—' ? status : (t.field ? '自动' : '手动')) + '</td>' +
    '</tr>';
  });
  tbody.innerHTML = html;
}

// ===== 加载数据 & 渲染 =====
function loadStockData() {
  fetch('../../data/stock_prices.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      stockData = data;
      renderStockCards();
      renderTracking();
    })
    .catch(function() {
      renderStockCards();
      renderTracking();
    });
}

function renderAll() {
  renderStockCards();
  renderTracking();
  if (stockData.length === 0) loadStockData();
}

// ===== 初始化 =====
window.addEventListener('DOMContentLoaded', function() {
  loadStockData();
});
</script>

</body>
</html>
