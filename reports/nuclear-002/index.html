<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国核电 (601985.SH) 深度分析 - 月泽小猫猫的逻辑库</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #f5f5f5; --bg-card: #fff; --text-primary: #1a1a1a;
  --text-secondary: #555; --text-muted: #888;
  --accent: #1a73e8; --border-color: #e0e0e0;
  --radius-md: 10px; --radius-sm: 6px;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --signal-safe: #43a047; --signal-danger: #e53935; --signal-warning: #f9a825;
  --flat-color: #ff6d00;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
  background: var(--bg); color: var(--text-primary);
  line-height: 1.6; padding: 0;
}

/* Header section */
.hero {
  background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
  color: #fff; padding: 40px 32px 32px;
}
.hero h1 { font-size: 1.6rem; margin-bottom: 4px; }
.hero .subtitle { font-size: 0.9rem; opacity: 0.8; margin-bottom: 18px; }
.dashboard-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px; max-width: 700px;
}
.dashboard-item {
  background: rgba(255,255,255,0.12); border-radius: var(--radius-sm);
  padding: 10px 14px; backdrop-filter: blur(6px);
}
.dashboard-item .label { font-size: 0.72rem; opacity: 0.7; }
.dashboard-item .value { font-size: 1.1rem; font-weight: 700; }
.dashboard-item .value.signal-up { color: #ef5350; }
.dashboard-item .value.signal-down { color: #66bb6a; }
.dashboard-item .value.signal-flat { color: var(--flat-color); }

/* Tab navigation */
.tab-nav {
  display: flex; background: #fff; border-bottom: 1px solid var(--border-color);
  position: sticky; top: 0; z-index: 100;
}
.tab-btn {
  padding: 14px 24px; cursor: pointer; font-size: 0.9rem;
  font-weight: 500; color: var(--text-muted);
  border: none; background: none; transition: all 0.2s;
  border-bottom: 2px solid transparent;
}
.tab-btn:hover { color: var(--text-primary); background: #f8f8f8; }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-btn .badge {
  display: inline-block; background: var(--accent); color: #fff;
  font-size: 0.7rem; border-radius: 10px; padding: 0 7px;
  margin-left: 4px; line-height: 1.5;
}

/* Tab content */
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Report iframe */
.report-container { padding: 0; }
.report-container iframe {
  width: 100%; border: none; display: block;
  min-height: 800px;
}

/* History tab */
.history-container { padding: 24px 32px; max-width: 900px; }
.history-list { list-style: none; }
.history-item {
  display: flex; align-items: flex-start; gap: 16px;
  padding: 16px 0; border-bottom: 1px solid var(--border-color);
}
.history-item:last-child { border-bottom: none; }
.version-tag {
  flex-shrink: 0; background: var(--accent); color: #fff;
  padding: 3px 10px; border-radius: var(--radius-sm);
  font-size: 0.78rem; font-weight: 600;
}
.version-tag.current { background: var(--signal-safe); }
.history-meta { flex-grow: 1; }
.history-date { font-size: 0.82rem; color: var(--text-muted); }
.history-desc { font-size: 0.92rem; margin-top: 2px; }
.history-link { color: var(--accent); text-decoration: none; font-size: 0.85rem; }
.history-link:hover { text-decoration: underline; }

/* Tracking section */
.tracking-container { padding: 0 32px 32px; max-width: 900px; }
.tracking-container h3 {
  font-size: 1.05rem; font-weight: 700; margin: 24px 0 12px;
  padding-top: 20px; border-top: 1px solid var(--border-color);
}
.tracking-table {
  width: 100%; border-collapse: collapse; font-size: 0.88rem;
}
.tracking-table th {
  text-align: left; padding: 8px 12px;
  background: #f0f0f0; font-weight: 600;
  border-bottom: 2px solid var(--border-color);
}
.tracking-table td {
  padding: 8px 12px; border-bottom: 1px solid #eee;
}
.tracking-table .status-ok { color: var(--signal-safe); font-weight: 600; }
.tracking-table .status-warn { color: var(--signal-warning); font-weight: 600; }
.tracking-table .status-err { color: var(--signal-danger); font-weight: 600; }

/* Events list */
.event-list { list-style: none; margin-top: 8px; }
.event-list li {
  padding: 6px 0; font-size: 0.88rem;
  display: flex; align-items: flex-start; gap: 8px;
}
.event-list li::before {
  content: "☐"; font-size: 1rem; flex-shrink: 0; margin-top: 1px;
}
.event-list li.done::before { content: "☑"; color: var(--signal-safe); }
.event-tag {
  font-size: 0.72rem; border-radius: 3px; padding: 1px 6px;
  margin-left: 8px; flex-shrink: 0;
}
.event-tag.upcoming { background: #fff3e0; color: #e65100; }
.event-tag.alert { background: #ffebee; color: #c62828; }
.event-tag.done { background: #e8f5e9; color: #2e7d32; }

@media (max-width: 600px) {
  .hero { padding: 24px 16px 20px; }
  .hero h1 { font-size: 1.3rem; }
  .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
  .tab-btn { padding: 12px 14px; font-size: 0.82rem; }
  .history-container, .tracking-container { padding: 16px; }
}
</style>
</head>
<body>

<!-- ========== HERO / 标题 + 仪表板 ========== -->
<div class="hero">
  <h1>中国核电 (601985.SH) 深度分析</h1>
  <div class="subtitle">核能产业链 · 10年现金流模型 · DCF估值 | 最新更新: 2026-05-18</div>
  <div class="dashboard-grid">
    <div class="dashboard-item">
      <div class="label">股价</div>
      <div class="value" id="dashPrice">—</div>
    </div>
    <div class="dashboard-item">
      <div class="label">PE(TTM)</div>
      <div class="value" id="dashPE">—</div>
    </div>
    <div class="dashboard-item">
      <div class="label">PB</div>
      <div class="value" id="dashPB">—</div>
    </div>
    <div class="dashboard-item">
      <div class="label">涨跌幅</div>
      <div class="value" id="dashChange">—</div>
    </div>
  </div>
</div>

<!-- ========== TAB 导航 ========== -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('report')">📄 最新研报</button>
  <button class="tab-btn" onclick="switchTab('history')">📂 历史版本 <span class="badge">2</span></button>
</div>

<!-- ========== TAB 1：最新研报 ========== -->
<div id="tab-report" class="tab-content active">
  <div class="report-container">
    <iframe id="reportFrame" src="latest.html" onload="resizeIframe(this)"></iframe>
  </div>
</div>

<!-- ========== TAB 2：历史版本 ========== -->
<div id="tab-history" class="tab-content">
  <div class="history-container">
    <h3 style="margin-bottom:12px">历史版本</h3>
    <ul class="history-list" id="versionList">
      <!-- 由 JS 动态渲染 -->
    </ul>
  </div>
</div>

<!-- ========== 追踪仪表板（位于最下方） ========== -->
<div class="tracking-container">
  <h3>📡 追踪仪表板</h3>
  <table class="tracking-table">
    <thead>
      <tr><th>指标</th><th>上次值</th><th>当前值</th><th>变化</th><th>状态</th></tr>
    </thead>
    <tbody id="trackingBody">
      <!-- 由 JS 动态渲染 -->
    </tbody>
  </table>

  <h3>📅 待关注事件</h3>
  <ul class="event-list" id="eventList">
    <li>Q2 核电核准公告 <span class="event-tag upcoming">预计7月</span></li>
    <li>2026年半年报披露 <span class="event-tag upcoming">预计8月底</span></li>
    <li>铀长协谈判进展（Kazatomprom） <span class="event-tag upcoming">关注中</span></li>
    <li>电力市场化交易比例更新 <span class="event-tag upcoming">季度更新</span></li>
  </ul>
</div>

<script>
// ===== Tab 切换 =====
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelector(`.tab-btn[onclick*="${name}"]`).classList.add('active');
  if (name === 'history') renderVersionList();
}

// ===== iframe 自适应高度 =====
function resizeIframe(iframe) {
  try {
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    iframe.style.height = Math.max(doc.documentElement.scrollHeight, 800) + 'px';
  } catch(e) {
    iframe.style.height = '1200px';
  }
}

// ===== 版本列表 =====
const VERSIONS = [
  {file: "latest.html", label: "最新版", date: "2026-05-18", desc: "当前最新版本（含电力供需与电价情景分析、五维框架）", current: true},
  {file: "v1-2026-05-18.html", label: "v1", date: "2026-05-18", desc: "初版发布 — 核能产业链 + 10年现金流模型 + DCF估值", current: false},
];

// ===== 追踪数据 =====
const TRACKING = [
  {label: "股价", lastVal: "9.04", field: "price"},
  {label: "PE(TTM)", lastVal: "18.5x", field: "pe"},
  {label: "PB", lastVal: "—", field: "pb"},
  {label: "DCF目标价（中性）", lastVal: "12.5元", field: null, currentVal: "待重算"},
  {label: "在建机组", lastVal: "12台（含核准待建）", field: null, currentVal: "待更新"},
  {label: "累计装机（已投产）", lastVal: "~25GW", field: null, currentVal: "待更新"},
  {label: "综合上网电价", lastVal: "~0.37元/kWh", field: null, currentVal: "待更新"},
];

// ===== 渲染历史版本列表 =====
function renderVersionList() {
  const list = document.getElementById('versionList');
  list.innerHTML = '';
  VERSIONS.forEach(v => {
    const li = document.createElement('li');
    li.className = 'history-item';
    li.innerHTML = `
      <span class="version-tag ${v.current ? 'current' : ''}">${v.label}</span>
      <div class="history-meta">
        <div class="history-date">${v.date}</div>
        <div class="history-desc">${v.desc}</div>
        <a href="${v.file}" class="history-link" target="_blank">查看完整内容 →</a>
      </div>
    `;
    list.appendChild(li);
  });
}

// ===== 渲染追踪仪表板 =====
function renderTracking(data) {
  const tbody = document.getElementById('trackingBody');
  tbody.innerHTML = '';
  TRACKING.forEach(t => {
    let currentVal = t.currentVal || '—';
    let status = '—';
    let statusClass = '';

    if (t.field && data && data[t.field] !== undefined) {
      currentVal = data[t.field];
      if (t.field === 'pe') currentVal = currentVal + 'x';
      if (t.field === 'pb') currentVal = currentVal + 'x';
    }

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${t.label}</td>
      <td>${t.lastVal}</td>
      <td>${currentVal}</td>
      <td>—</td>
      <td class="${statusClass}">${status || (t.field ? '自动' : '手动')}</td>
    `;
    tbody.appendChild(tr);
  });
}

// ===== 从 JSON 加载股价数据 =====
function loadStockData() {
  fetch('../../data/stock_prices.json')
    .then(r => r.json())
    .then(data => {
      const stock = data.find(s => s.code === '601985');
      if (stock) {
        document.getElementById('dashPrice').textContent = stock.price || '—';
        document.getElementById('dashPE').textContent = (stock.pe || '—') + 'x';
        document.getElementById('dashPB').textContent = (stock.pb || '—') + 'x';
        const chg = stock.changePercent;
        if (chg !== undefined) {
          const el = document.getElementById('dashChange');
          el.textContent = (chg > 0 ? '+' : '') + Number(chg).toFixed(2) + '%';
          el.className = 'value ' + (chg > 0 ? 'signal-up' : chg < 0 ? 'signal-down' : 'signal-flat');
        }
        renderTracking(stock);
      } else {
        renderTracking(null);
      }
    })
    .catch(() => renderTracking(null));
}

// ===== 初始化 =====
window.addEventListener('DOMContentLoaded', () => {
  loadStockData();
});
</script>

</body>
</html>
